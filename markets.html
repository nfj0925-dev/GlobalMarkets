<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Real-time monitoring of international trading sessions">
  <title>Markets - Global Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&family=JetBrains+Mono:wght@700&display=swap"
    rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div id="loading-overlay" class="loading-overlay" role="status" aria-live="polite">
    <div class="loading-spinner" aria-hidden="true"></div>
    <div class="loading-text">Loading market data...</div>
  </div>

  <div id="offline-banner" class="offline-banner" role="alert" aria-live="assertive">
    ⚠️ You are offline. Market data may be outdated.
  </div>

  <div id="refresh-indicator" class="refresh-indicator" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16" />
    </svg>
  </div>

  <header class="header">
    <a href="index.html" class="back-link" id="manual-back" style="display: none" aria-label="Back to menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1>LIVE <span>MARKETS</span></h1>
    <div class="subtitle">Real-time monitoring of international trading sessions</div>
  </header>

  <main class="grid" role="main" aria-label="Market cards"></main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
